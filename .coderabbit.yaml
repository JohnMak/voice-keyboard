# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit Configuration
# https://docs.coderabbit.ai/

language: ru

reviews:
  # Автоматический ревью для всех PR
  auto_review:
    enabled: true
    # Ревьюить PR в любую ветку (не только main)
    base_branches:
      - main
      - gui
      - develop
    # Игнорировать драфт PR
    drafts: false
  # Профиль ревью
  profile: assertive
  # Путь фильтры
  path_filters:
    - "**/*.rs"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.html"
    - "**/*.css"
    - "**/*.toml"
    - "**/*.yml"
    - "**/*.yaml"
  # Игнорировать
  path_instructions:
    - path: "**/*.lock"
      instructions: "Ignore this file"
    - path: "**/target/**"
      instructions: "Ignore build artifacts"

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  learnings:
    scope: auto
