name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Windows CLI build with launcher + core app
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-release

      # Build core app (voice-typer) with all features
      - name: Build voice-typer
        run: cargo build --release --bin voice-typer --features "whisper,opus,gui,updater" --target x86_64-pc-windows-msvc

      # Build launcher
      - name: Build launcher
        run: cargo build --release --bin voice-typer-launcher --features "updater" --target x86_64-pc-windows-msvc

      # Test binaries
      - name: Test binaries
        shell: bash
        run: |
          ./target/x86_64-pc-windows-msvc/release/voice-typer.exe --help
          ./target/x86_64-pc-windows-msvc/release/voice-typer-launcher.exe --help || true

      # Prepare artifacts
      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist

          # Copy both executables
          Copy-Item "target/x86_64-pc-windows-msvc/release/voice-typer.exe" -Destination "dist/"
          Copy-Item "target/x86_64-pc-windows-msvc/release/voice-typer-launcher.exe" -Destination "dist/"

          # Copy docs
          Copy-Item "README.md" -Destination "dist/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" -Destination "dist/"

          # Create zip
          Compress-Archive -Path "dist/*" -DestinationPath "voice-typer-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-typer-windows-x64
          path: voice-typer-windows-x64.zip

  # Windows Tauri GUI app (NSIS installer)
  build-tauri-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-tauri

      - name: Build voice-typer sidecar
        run: cargo build --release --bin voice-typer --features "whisper,opus" --target x86_64-pc-windows-msvc

      - name: Copy sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Copy-Item "target/x86_64-pc-windows-msvc/release/voice-typer.exe" -Destination "src-tauri/binaries/voice-typer-x86_64-pc-windows-msvc.exe"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: voice-keyboard-windows-x64-setup
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # macOS Tauri GUI app (DMG)
  build-tauri-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-tauri

      - name: Build voice-typer sidecar
        env:
          CFLAGS: "-march=armv8-a+dotprod"
          CXXFLAGS: "-march=armv8-a+dotprod"
        run: cargo build --release --bin voice-typer --features "whisper,opus"

      - name: Copy sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          cp target/release/voice-typer "src-tauri/binaries/voice-typer-$(rustc -vV | grep host | cut -d' ' -f2)"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build --features macos-private-api

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: voice-keyboard-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # Create GitHub Release
  release:
    needs: [build-windows, build-tauri-windows, build-tauri-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.exe" \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ## Voice Keyboard App (Recommended)

            Desktop app with system tray, settings UI, and bundled voice-typer:

            - **macOS:** Download `Voice.Keyboard_*.dmg`, open and drag to Applications
            - **Windows:** Download `Voice.Keyboard_*_x64-setup.exe` and run the installer

            Windows SmartScreen may warn about unknown publisher — click "More info" -> "Run anyway"

            ## CLI-only (Advanced)

            Standalone command-line binaries without the GUI:
            - **Windows:** Download `voice-typer-windows-x64.zip` and extract

            ## Setup

            1. Get OpenAI API key from [platform.openai.com](https://platform.openai.com)
            2. Enter it in Settings
            3. Hold **Right Ctrl** (Windows) or **Fn** (macOS) to record, release to transcribe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
