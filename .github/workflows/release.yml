name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Windows build with launcher + core app
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-release

      # Build core app (voice-typer) with all features
      - name: Build voice-typer
        run: cargo build --release --bin voice-typer --features "whisper,opus,gui,updater" --target x86_64-pc-windows-msvc

      # Build launcher
      - name: Build launcher
        run: cargo build --release --bin voice-typer-launcher --features "updater" --target x86_64-pc-windows-msvc

      # Test binaries
      - name: Test binaries
        shell: bash
        run: |
          ./target/x86_64-pc-windows-msvc/release/voice-typer.exe --help
          ./target/x86_64-pc-windows-msvc/release/voice-typer-launcher.exe --help || true

      # Prepare artifacts
      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist

          # Copy both executables
          Copy-Item "target/x86_64-pc-windows-msvc/release/voice-typer.exe" -Destination "dist/"
          Copy-Item "target/x86_64-pc-windows-msvc/release/voice-typer-launcher.exe" -Destination "dist/"

          # Copy docs
          Copy-Item "README.md" -Destination "dist/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" -Destination "dist/"

          # Create zip
          Compress-Archive -Path "dist/*" -DestinationPath "voice-typer-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-typer-windows-x64
          path: voice-typer-windows-x64.zip

  # Create GitHub Release
  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name "*.zip" -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ## Windows Installation

            1. Download `voice-typer-windows-x64.zip` and extract
            2. Run `voice-typer-launcher.exe` (this handles updates)
            3. Configure API key in Settings (system tray icon)

            **Files included:**
            - `voice-typer-launcher.exe` - Run this! Handles updates and launches the app
            - `voice-typer.exe` - Core application (launched by launcher)

            Windows SmartScreen may warn about unknown publisher — click "More info" → "Run anyway"

            ## Setup

            1. Get OpenAI API key from [platform.openai.com](https://platform.openai.com)
            2. Enter it in Settings
            3. Hold **Right Ctrl** to record, release to transcribe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
