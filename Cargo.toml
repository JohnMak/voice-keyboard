[package]
name = "voice-keyboard"
version = "0.1.0"
edition = "2021"
authors = ["Alex Mak"]
description = "Push-to-talk voice keyboard with local Whisper recognition"
license = "MIT"
repository = "https://github.com/alexmak/voice-keyboard"

[dependencies]
# Whisper speech recognition
whisper-rs = "0.15"

# Audio - WAV file handling (cross-platform)
hound = "3.5"

# Clipboard (cross-platform)
arboard = "3"

# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }

# Config
serde = { version = "1", features = ["derive"] }
serde_json = "1"
directories = "5"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "2"
anyhow = "1"

# macOS-only dependencies (require system frameworks, not available on Linux CI)
[target.'cfg(target_os = "macos")'.dependencies]
cpal = "0.15"       # Audio recording (uses CoreAudio)
rdev = "0.5"        # Global hotkeys (uses IOKit)
enigo = "0.2"       # Keyboard simulation (requires Accessibility)
tray-icon = "0.19"  # System tray

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"

[features]
default = []
coreml = ["whisper-rs/coreml"]
metal = ["whisper-rs/metal"]

[profile.release]
lto = true
codegen-units = 1
strip = true

[package.metadata.bundle]
name = "Voice Keyboard"
identifier = "com.alexmak.voice-keyboard"
icon = ["icons/icon.icns"]
category = "public.app-category.productivity"
short_description = "Voice to text input"
